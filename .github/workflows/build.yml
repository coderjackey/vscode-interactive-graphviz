name: CI - Build, Package & Lint
on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: setup vsce
        run: npm install -g @vscode/vsce
      - run: echo "🐧 -- we are ready to roll 🙌 --"
      - name: npm ci
        run: npm ci
      - name: vsce package
        run: vsce package
      - name: lint
        run: npm run lint
